<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>
    <style>
        body{
            font-family: Arial, sans-serif; margin:20px;
        }
        nav{
            background-color: lightblue; padding:10px;
        }
        nav a{
            margin-right: 20px; text-decoration: none;
        }
        #welcomeBanner{
            background-color: blue;color-scheme: white;padding: 10px; margin-top: 10px;
        }
        .highlight{
            background-color: yellow;
        }
        .gallery{
            border: 2px solid black;
        }
        form{
            margin-top: 20px;padding: 15px;border: 1px solid black;width:400px;
        }
        input, select, textarea{
            width: 100%;margin: 5px 0; padding:5px ;
        }

    </style>
    <script>
        function countChars(){
            let text=document.getElementById("feedback").value; document.getElementById("charCount").innerHTML="Characters:"+text.length;

        }
        function showFee(){
            let event=document.getElementById("eventType").value;let fee="";
            if(event=="music")
            fee="Fee:₹100";
        else if(event=="Sports")
        fee="Fee:₹150";
    else
    fee="Fee:₹200";
document.getElementById("fee").innerHTML=fee;
        }
        function validPhone(){
            let phone=document.getElementById("phone").value;
            if(phone.length!=10){
                alert("Enter valid 10 digit phone number");

            }
        }

        function registerEvent(){
            document.getElementById("output").innerHTML="Registration Successful!";
        }
        function videoReady(){
            document.getElementById("videoMsg").innerHtml="Video ready to play";

        }
        function enlargeImage(img){
            img.style.width="250px";
        }
        function savePerference(){
            let value=document.getElementById("eventType").value;
            localStorage.setItem("eventType", value);
            alert("Preference Saved");
        }
        function loadPreference(){
            let saved=locanStorage.getItem("eventType");
            if(saved){
                document.getElementById("eventType").value=saved;
            }
        }
        function clearPreference(){
            localStorage.clear();
            sessionStorage.clear();
            alert("Preferences Cleared");

        }
        function getLocation(){
            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition(
                    function(position){
                        document.getElementById("location").innerHTML="Latitude:"+position.coords.latitude+"<br>longitude:"+position.coords.longitude;

                    },
                    function(error){
                        alert("Location access denied");

                    },
                    {
                        enableHighAccuracy:true,
                        timeout:5000
                    }
                );
            
            }
        }
        window.onload=loadPreference;
        window.onbeforeunload=function(){
            return "Form not completed!";

        }


    </script>
</head>
<body>
    <!--now i use navigation tab<!Navigation-->
    <nav>
       <a href="#home">Home</a>
              <a href="#events">Events</a>
                     <a href="#contact">Contact</a>
                     <a href="help.html"target="_blank"></a>


    </nav>
    <!--Home-->
    <section id="home">
    <div id="welcomeBanner">
    
    <h2>Welcome to Community Portal</h2>
    <p class="highlight">Special Offer:Free registration</p>
    </div>
    </section>
    <!--Events-->
    <section id="events">
        <h2>Community Events Gallery</h2>
    <table>
        <tr>
            
            <td><img src="img13.png" width="150" class="gallery"alt="Music Event" title="Music Event"onclick="enlargeImage(this)"></td>
            <td><img src="img14.png" width="150" class="gallery" alt="Spoken Event"title="Spoken Event" onclick="enlargeImage(this)"></td>
            <td><img src="img16.png" width="150" class="gallery" alt="Food Festival"title="Food Festival"onclick="enlargeImage(this)"></td>

                                    <td><img src="img9.png" width="150" class="gallery"></td>


        </tr>
        <tr>
            <td><img src="img4.png" width="150"class="gallery"></td>
            <td><img src="img6.png" width="150"class="gallery"></td>
            <td><img src="img5.png" width="150"class="gallery"></td>


            <td><img src="img11.png" width="155"class="gallery"></td>

        </tr>
    </table>
    </section>
    <!--Registration Form-->
    <section>
        <h2>Event Registration Form</h2>
<form>
    <input type="text"placeholder="Enter Name" required autofocus>
    
    <input type="email" placeholder="Enter Email"required>
    

    <input type="date"required>
<input type="text" id="phone" placeholde="validatephone()">

    <select id="evenType" onchange="showFee()">
        <option>Music</option>
        
        <option>Sports</option>
        <option>Workshop</option>
    </select>
    <p id="fee"></p>
    <textarea placeholder="Message"></textarea>
    <textarea id="feedback" placeholder="Feedback" onkeyup="countChars()"></textarea>
    <p id="charCount">Characters:O</p>
    <button type="submit">Register</button>
    <output id="output"></output>
    </form>
    <br>
    <button onclick="savePreference()">Save preference</button>
    <button onclick="clearPreferences()">Clear Preference</button>
    </section>
    <!--Video-->
    <section>
        <h2>Event Video</h2>
        <video controls width="300" oncanplay="videoReady()">
    
        <source src="event.mp4" type="video/mp4">
        </video>
        <p id="videoMsg"></p>
        </section>
        <!--Geolocation-->
        <section id="contact">
            <h2>Find Nearby Events</h2>
            
    <button onclick="getLocation()"> find Nearby Events </button>
    <p id="location"></p>
    </section>

</body>
</html>
